<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounts Department Volunteers &mdash; July 10-12, 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF7; --surface:#FFFFFF; --ink:#1B2420; --muted:#68716C;
  --faint:#9AA29D; --line:#E6E6DF; --accent:#2E6B4F; --accent-soft:#EDF3EF;
  --sister:#8A6230; --sister-soft:#F6F0E7;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Public Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;font-size:15px;
}
.mono{font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
.container{max-width:880px;margin:0 auto;padding:0 20px 64px}

/* ── Header ── */
header{padding:56px 0 28px;border-bottom:1px solid var(--line)}
.eyebrow{
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--accent);margin-bottom:10px;
}
header h1{
  font-family:'Sora',sans-serif;font-weight:600;
  font-size:clamp(24px,4.6vw,34px);letter-spacing:-0.02em;line-height:1.15;
}
.header-meta{margin-top:8px;font-size:13px;color:var(--muted)}
.legend{display:flex;gap:18px;margin-top:16px;font-size:12px;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-b{background:var(--accent)} .dot-s{background:var(--sister)}

/* ── Controls ── */
.controls{
  position:sticky;top:0;z-index:10;background:var(--bg);
  padding:16px 0 14px;border-bottom:1px solid var(--line);
}
.controls-inner{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.nav-bar{display:inline-flex;border:1px solid var(--line);border-radius:8px;background:var(--surface);overflow:hidden}
.tab-btn{
  padding:9px 18px;border:none;background:transparent;cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:500;color:var(--muted);
  border-right:1px solid var(--line);transition:background .15s,color .15s;
}
.tab-btn:last-child{border-right:none}
.tab-btn small{display:block;font-size:10.5px;font-weight:400;color:var(--faint);margin-top:1px}
.tab-btn:hover:not(.tab-active){color:var(--ink)}
.tab-btn.tab-active{background:var(--ink);color:#fff}
.tab-btn.tab-active small{color:rgba(255,255,255,.65)}
.tab-btn:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

.search-bar{flex:1;min-width:220px}
.search-input-wrap{
  display:flex;align-items:center;gap:8px;background:var(--surface);
  border:1px solid var(--line);border-radius:8px;padding:0 12px;
  transition:border-color .15s,box-shadow .15s;
}
.search-input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search-input-wrap .icon{color:var(--faint);flex-shrink:0;display:flex}
.search-input-wrap input{
  flex:1;border:none;background:transparent;padding:10px 0;
  font-size:14px;font-family:inherit;outline:none;color:var(--ink);
}
.search-input-wrap input::placeholder{color:var(--faint)}
.search-clear{
  display:none;background:none;border:none;color:var(--faint);
  font-size:18px;cursor:pointer;padding:2px;line-height:1;
}
.search-clear:hover{color:var(--ink)}
.search-clear.visible{display:block}
.search-status{font-size:12.5px;color:var(--muted);margin-top:8px;min-height:1.4em}
.search-status strong{color:var(--ink);font-weight:600}
.search-status .clear-link{color:var(--accent);cursor:pointer;font-weight:500;margin-left:6px}
.search-status .clear-link:hover{text-decoration:underline}

.search-result-name{
  overflow:hidden;transition:max-height .25s ease,opacity .2s ease,margin .25s ease;
  opacity:0;max-height:0;
}
.search-result-name.visible{opacity:1;max-height:60px;margin-top:6px}
.search-result-name h2{font-family:'Sora',sans-serif;font-size:16px;font-weight:600}
.search-result-name h2 span{color:var(--accent)}

/* ── Day panels ── */
.day-panel{display:none}
.day-panel.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){
  .day-panel.active{animation:none}
  .search-result-name,.shift-card,.special-roles-section{transition:none}
}
.section-title{
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--faint);margin:32px 0 4px;
}

/* ── Shift rows ── */
.shift-card{
  border-bottom:1px solid var(--line);padding:22px 0 24px;
  transition:opacity .2s,max-height .3s,padding .25s;
}
.shift-card.filtered-out,.special-roles-section.filtered-out{
  opacity:0;max-height:0!important;padding:0!important;margin:0!important;
  overflow:hidden;pointer-events:none;border-bottom:none;
}
.shift-card.highlighted .shift-num{
  display:inline-block;color:var(--accent);font-weight:500;
  margin-right:12px;padding-right:12px;border-right:1px solid var(--line);
}
.shift-time{color:var(--accent)}
.shift-card.highlighted{box-shadow:inset 3px 0 0 var(--accent);padding-left:16px}
.shift-num{
  display:inline-block;color:var(--accent);font-weight:500;
  margin-right:12px;padding-right:12px;border-right:1px solid var(--line);
}
.shift-time{
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  font-size:13px;font-weight:500;color:var(--ink);
  display:block;margin-bottom:14px;letter-spacing:.01em;
}
.shift-body-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:28px;align-items:start}
@media(max-width:600px){.shift-body-grid{grid-template-columns:1fr;gap:16px}}
.role-section h4{
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);margin-bottom:8px;
}
.name-list{display:flex;flex-wrap:wrap;gap:4px 14px}
.name-tag{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;color:var(--ink)}
.name-tag::before{content:"";width:6px;height:6px;border-radius:50%;flex-shrink:0}
.name-tag.name-hit{
  background:#FFF3C4;border-radius:4px;padding:1px 6px 1px 4px;
  box-shadow:0 0 0 1px #EBD98A;font-weight:600;
}
.brother-tag::before{background:var(--accent)}
.sister-tag::before{background:var(--sister)}

.box-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 18px}
@media(max-width:420px){.box-grid{grid-template-columns:1fr}}
.box-row{display:flex;align-items:baseline;gap:8px;font-size:13.5px}
.box-num{
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  font-size:11px;color:var(--faint);min-width:22px;flex-shrink:0;
}
.box-row .name-tag{font-size:13.5px}

/* ── Special roles ── */
.special-roles-section{
  margin-top:40px;padding:20px 22px;background:var(--surface);
  border:1px solid var(--line);border-radius:10px;
  transition:opacity .2s,max-height .3s,padding .25s,margin .25s;
}
.special-roles-section.highlighted{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.special-roles-section .section-title{margin:0 0 2px}
.section-desc{font-size:12.5px;color:var(--muted);margin-bottom:12px}
.special-roles-grid{display:flex;flex-direction:column;gap:6px}
.special-role-item{display:flex;align-items:baseline;gap:8px;font-size:13.5px}
.special-role-desc{color:var(--muted);font-size:12.5px}

/* ── Print ── */
@media print{
  body{background:#fff;font-size:12px}
  .controls,.search-status,.search-result-name{display:none!important}
  header{padding:10px 0}
  .day-panel{display:block!important}
  .shift-card{break-inside:avoid;padding:12px 0}
  .special-roles-section{break-inside:avoid;border:1px solid #ccc}
  .shift-card.filtered-out,.special-roles-section.filtered-out{
    opacity:1!important;max-height:none!important;overflow:visible!important;
    padding:12px 0!important;margin:0!important;pointer-events:auto!important;
    border-bottom:1px solid #ddd!important;
  }
  .name-tag::before{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .name-tag.name-hit{background:#FFF3C4!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div class="container">
<header>
  <div class="eyebrow">Convention &middot; July 10&ndash;12, 2026</div>
  <h1>Accounts Department<br>Volunteer Schedule</h1>
  <div class="header-meta">Shift assignments for key brothers, box attendants, and counters</div>
  <div class="legend">
    <span><span class="dot dot-b"></span>Brothers</span>
    <span><span class="dot dot-s"></span>Sisters</span>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <nav class="nav-bar" role="tablist">
      <button class="tab-btn tab-active" data-day="fri" role="tab" aria-selected="true" onclick="showDay('fri')">Friday<br><small>July 10, 2026</small></button>
      <button class="tab-btn" data-day="sat" role="tab" aria-selected="false" onclick="showDay('sat')">Saturday<br><small>July 11, 2026</small></button>
      <button class="tab-btn" data-day="sun" role="tab" aria-selected="false" onclick="showDay('sun')">Sunday<br><small>July 12, 2026</small></button>
    </nav>
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="icon" aria-hidden="true">&#x1F50D;</span>
        <input type="text" id="searchInput" oninput="searchNames()" placeholder="Search for a name&hellip;" autocomplete="off">
        <button class="search-clear" id="searchClear" onclick="clearSearch()" aria-label="Clear search">&times;</button>
      </div>
      <div class="search-status" id="searchStatus">Loading live schedule from Google Sheets&hellip;</div>
      <div class="search-result-name" id="searchResultName">
        <h2>Showing schedule for: <span id="searchNameDisplay"></span></h2>
      </div>
    </div>
  </div>
</div>

<div id="day-fri" class="day-panel active" role="tabpanel"><div class="shift-card">Loading Friday schedule&hellip;</div></div>
<div id="day-sat" class="day-panel" role="tabpanel"><div class="shift-card">Loading Saturday schedule&hellip;</div></div>
<div id="day-sun" class="day-panel" role="tabpanel"><div class="shift-card">Loading Sunday schedule&hellip;</div></div>
<div class="special-roles-section" id="oversight-section" data-names=""></div>
</div>
<script src="app.js"></script>
</body>
</html>
